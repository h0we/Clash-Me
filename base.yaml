port: 7890
socks-port: 7891
redir-port: 7892

allow-lan: true
bind-address: "*"

mode: rule
log-level: info

external-controller: 127.0.0.1:9090
secret: "000000"

skip-cert-verify: true
ipv6: true

dns:
  enable: false
  listen: 0.0.0.0:53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
    - 2001:4860:4860::8888

  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
    - 223.5.5.5
    - 119.29.29.29

